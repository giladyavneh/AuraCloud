services:
  redis:
    image: redis:7-alpine
    container_name: auracloud-redis
    ports:
      - "${REDIS_PUBLISH_PORT:-6379}:6379"
    command: redis-server --appendonly yes
    volumes:
      - auracloud-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  auracloud-redis-data:
